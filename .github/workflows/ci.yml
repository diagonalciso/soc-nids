name: ci
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: byte-compile
        run: python -m py_compile app.py
      - name: smoke import
        run: python -c "import ast,sys; ast.parse(open('app.py').read()); print('parse ok')"
